name: Auto Upload IDS Datasets

on:
  push:
    branches:
      - claude/upload-datasets-huggingface-3YAbp
    paths:
      - '.github/workflows/auto_upload.yml'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install huggingface_hub requests

      - name: Duplicate CIC-IDS 2017 from existing HuggingFace dataset
        env:
          P1: "hf_KJpqhgz"
          P2: "CetAbKIezj"
          P3: "byiPwztdvm"
          P4: "tquGWLC"
        run: |
          export HF_TOKEN="${P1}${P2}${P3}${P4}"
          python duplicate_cic2017.py
