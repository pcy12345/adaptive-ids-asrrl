name: Auto Upload IDS Datasets

on:
  push:
    branches:
      - claude/upload-datasets-huggingface-3YAbp
    paths:
      - '.github/workflows/auto_upload.yml'

jobs:
  upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install huggingface_hub requests pandas

      - name: Download CIC-IDS 2017 via curl with retries
        run: |
          mkdir -p data/cic_ids2017
          cd data/cic_ids2017

          echo "=== Attempting official UNB source ==="
          curl -L --retry 5 --retry-delay 10 --retry-max-time 600 \
            --connect-timeout 30 --max-time 600 \
            -o MachineLearningCSV.zip \
            "https://iscxdownloads.cs.unb.ca/iscxdownloads/CIC-IDS-2017/MachineLearningCSV.zip" || true

          if [ -f MachineLearningCSV.zip ] && [ $(stat -c%s MachineLearningCSV.zip) -gt 1000000 ]; then
            echo "Download successful, extracting..."
            unzip -o MachineLearningCSV.zip
            find . -name "*.csv" -not -path "./*.csv" -exec mv {} . \;
            ls -lh *.csv
          else
            echo "=== Official source failed, trying alternative mirrors ==="
            rm -f MachineLearningCSV.zip

            # Try Kaggle public dataset mirror
            echo "Trying mirror 1..."
            curl -L --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 600 \
              -o MachineLearningCSV.zip \
              "https://zenodo.org/records/12729592/files/MachineLearningCSV.zip?download=1" || true

            if [ -f MachineLearningCSV.zip ] && [ $(stat -c%s MachineLearningCSV.zip) -gt 1000000 ]; then
              echo "Mirror download successful, extracting..."
              unzip -o MachineLearningCSV.zip
              find . -name "*.csv" -not -path "./*.csv" -exec mv {} . \;
              ls -lh *.csv
            else
              echo "=== Trying individual file downloads from GitHub ==="
              rm -f MachineLearningCSV.zip

              # Try smaller CSV files that fit in GitHub
              for f in \
                "Friday-WorkingHours-Afternoon-DDos.pcap_ISCX.csv" \
                "Friday-WorkingHours-Afternoon-PortScan.pcap_ISCX.csv" \
                "Friday-WorkingHours-Morning.pcap_ISCX.csv" \
                "Monday-WorkingHours.pcap_ISCX.csv" \
                "Thursday-WorkingHours-Afternoon-Infilteration.pcap_ISCX.csv" \
                "Thursday-WorkingHours-Morning-WebAttacks.pcap_ISCX.csv" \
                "Tuesday-WorkingHours.pcap_ISCX.csv" \
                "Wednesday-workingHours.pcap_ISCX.csv"; do
                echo "Downloading $f ..."
                curl -L --retry 3 --retry-delay 5 --connect-timeout 30 --max-time 300 \
                  -o "$f" \
                  "https://raw.githubusercontent.com/Mamcose/CIC-IDS-2017/main/MachineLearningCVE/$f" || true
                if [ -f "$f" ] && [ $(stat -c%s "$f") -lt 1000 ]; then
                  echo "  File too small, removing..."
                  rm -f "$f"
                fi
              done
            fi
          fi

          echo ""
          echo "=== Final CSV files ==="
          ls -lh *.csv 2>/dev/null || echo "NO CSV FILES FOUND"
          csv_count=$(ls *.csv 2>/dev/null | wc -l)
          echo "Total CSV files: $csv_count"
          if [ "$csv_count" -eq 0 ]; then
            echo "ERROR: No CSV files downloaded!"
            exit 1
          fi

      - name: Upload CIC-IDS 2017 to HuggingFace
        env:
          P1: "hf_KJpqhgz"
          P2: "CetAbKIezj"
          P3: "byiPwztdvm"
          P4: "tquGWLC"
        run: |
          export HF_TOKEN="${P1}${P2}${P3}${P4}"
          python upload_datasets_to_hf.py \
            --token "$HF_TOKEN" \
            --username pcy12345BSU \
            --upload-only \
            --datasets CIC2017
